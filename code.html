<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Reflex Game</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        #game-container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
        }

        #color-display {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: #555;
            margin: 20px auto;
            transition: background-color 0.1s ease;
            border: 4px solid #333;
        }

        .hud {
            font-size: 1.2rem;
            margin: 5px 0;
            font-weight: bold;
        }

        .score-highlight {
            color: #4caf50;
            font-size: 1.5rem;
        }

        .buttons-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        #btn-action { background-color: #2196f3; color: white; }
        #btn-action:hover { background-color: #1976d2; }

        #btn-skip { background-color: #e0e0e0; color: #333; }
        #btn-skip:hover { background-color: #bdbdbd; }

        #btn-start {
            background-color: #4caf50;
            color: white;
            padding: 15px 40px;
            font-size: 1.3rem;
            margin-top: 20px;
            width: 100%;
        }

        .inventory-section {
            margin-top: 25px;
            background: #252525;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .inventory-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffeb3b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .item-btn {
            background-color: #3a3a3a;
            color: white;
            padding: 8px;
            font-size: 0.85rem;
            border-radius: 5px;
            border: 1px solid #555;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .item-btn:disabled {
            background-color: #1f1f1f;
            color: #555;
            border-color: #2a2a2a;
            cursor: not-allowed;
        }

        .item-count {
            font-size: 0.75rem;
            background: #555;
            padding: 2px 6px;
            border-radius: 10px;
            color: #fff;
        }

        .item-btn:not(:disabled) .item-count {
            background: #ff9800;
        }

        .active-effects {
            font-size: 0.85rem;
            color: #ff9800;
            margin: 10px 0;
            min-height: 20px;
            font-weight: 500;
        }

        .rules {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: left;
            margin-top: 15px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <h2>Color Reflex</h2>
        
        <div class="hud">Score: <span id="score-view" class="score-highlight">0</span></div>
        <div id="timer-view" style="font-size: 0.9rem; color: #aaa;">Remaining time: --</div>
        <div id="effects-view" class="active-effects"></div>

        <div id="color-display"></div>

        <div class="buttons-container" id="game-controls" style="display: none;">
            <button id="btn-action">HIT (←)</button>
            <button id="btn-skip">SKIP (→)</button>
        </div>

        <button id="btn-start">Start Game</button>

        <div class="inventory-section">
            <div class="inventory-title">Inventory (1-Use Items)</div>
            <div class="items-grid">
                <button class="item-btn" id="item-clock" disabled>
                    <span>🕒 Clock</span>
                    <span class="item-count" id="count-clock">0</span>
                </button>
                <button class="item-btn" id="item-switcher" disabled>
                    <span>🔀 Switcher</span>
                    <span class="item-count" id="count-switcher">0</span>
                </button>
                <button class="item-btn" id="item-multiplier" disabled>
                    <span>🔺 Multiplier</span>
                    <span class="item-count" id="count-multiplier">0</span>
                </button>
                <button class="item-btn" id="item-reducer" disabled>
                    <span>🔻 Reducer</span>
                    <span class="item-count" id="count-reducer">0</span>
                </button>
                <button class="item-btn" id="item-luck" style="grid-column: span 2;" disabled>
                    <span>🌟 Impactful Luck</span>
                    <span class="item-count" id="count-luck">0</span>
                </button>
            </div>
        </div>

        <div class="rules" id="rules-box">
            <strong>Game Rules:</strong><br>
            🔵 <strong>Blue</strong>: Hit for +1 point.<br>
            🟢 <strong>Green</strong>: Hit for +2 points.<br>
            🔴 <strong>Red</strong>: Skip! Hitting loses -1 point.<br>
            🎁 Every 5 points rewards a random usable item.<br>
            ⏱ / ⌨ 0.35s to decide. Use Arrow Keys to play.
        </div>
    </div>

    <script>
        const BASE_DECISION_TIME = 350; 
        const TOTAL_ROUNDS = 40;  

        let score = 0;
        let currentRound = 0;
        let currentColor = "";
        let timeoutId = null;
        let respondedThisRound = false;
        let lastScoreMilestone = 0;
        let currentSpeedModifier = 1.0;

        let inventory = { clock: 0, switcher: 0, multiplier: 0, reducer: 0, luck: 0 };
        let activeEffects = { clockRounds: 0, multiplierActive: false, reducerActive: false, luckStreakActive: false };

        const availableColors = ["blue", "green", "red"];
        const itemKeys = ["clock", "switcher", "multiplier", "reducer", "luck"];
        const hexColors = { "blue": "#2196f3", "green": "#4caf50", "red": "#f44336", "default": "#555" };
        const opposites = { "red": "blue", "blue": "green", "green": "red" };

        const elDisplay = document.getElementById("color-display");
        const elScore = document.getElementById("score-view");
        const elTimer = document.getElementById("timer-view");
        const elEffects = document.getElementById("effects-view");
        const elBtnStart = document.getElementById("btn-start");
        const elControls = document.getElementById("game-controls");
        const elRules = document.getElementById("rules-box");

        elBtnStart.addEventListener("click", startGame);
        document.getElementById("btn-action").addEventListener("click", () => processChoice("hit"));
        document.getElementById("btn-skip").addEventListener("click", () => processChoice("skip"));

        itemKeys.forEach(key => {
            document.getElementById(`item-${key}`).addEventListener("click", () => useItem(key));
        });

        window.addEventListener("keydown", (e) => {
            if (elControls.style.display === "none" || respondedThisRound) return;
            if (e.key === "ArrowLeft") processChoice("hit");
            if (e.key === "ArrowRight") processChoice("skip");
        });

        function startGame() {
            score = currentRound = lastScoreMilestone = 0;
            currentSpeedModifier = 1.0;
            inventory = { clock: 0, switcher: 0, multiplier: 0, reducer: 0, luck: 0 };
            activeEffects = { clockRounds: 0, multiplierActive: false, reducerActive: false, luckStreakActive: false };
            
            updateInventoryUI();
            elScore.textContent = score;
            elBtnStart.style.display = "none";
            elRules.style.display = "none";
            elControls.style.display = "flex";
            nextRound();
        }

        function updateInventoryUI() {
            itemKeys.forEach(key => {
                document.getElementById(`count-${key}`).textContent = inventory[key];
                const btn = document.getElementById(`item-${key}`);
                if (inventory[key] > 0 && elControls.style.display === "flex" && !respondedThisRound) {
                    btn.removeAttribute("disabled");
                } else {
                    btn.setAttribute("disabled", "true");
                }
            });
        }

        function updateEffectsUI() {
            let texts = [];
            if (activeEffects.clockRounds > 0) texts.push(`🕒 Clock (${activeEffects.clockRounds} left)`);
            if (activeEffects.multiplierActive) texts.push(`🔺 Multiplier (Next hit)`);
            if (activeEffects.reducerActive) texts.push(`🔻 Reducer (Next red)`);
            if (activeEffects.luckStreakActive) texts.push(`🌟 Luck Streak (${(1/currentSpeedModifier).toFixed(1)}x speed)`);
            elEffects.textContent = texts.join(" | ");
        }

        function useItem(itemType) {
            if (inventory[itemType] <= 0 || respondedThisRound) return;
            inventory[itemType]--;

            if (itemType === "clock") activeEffects.clockRounds = 5;
            else if (itemType === "switcher") {
                currentColor = opposites[currentColor];
                elDisplay.style.backgroundColor = hexColors[currentColor];
            } 
            else if (itemType === "multiplier") activeEffects.multiplierActive = true;
            else if (itemType === "reducer") activeEffects.reducerActive = true;
            else if (itemType === "luck") {
                activeEffects.luckStreakActive = true;
                currentSpeedModifier = 1.0;
            }

            updateInventoryUI();
            updateEffectsUI();
            if (timeoutId) clearTimeout(timeoutId);
            setupTimer();
        }

        function setupTimer() {
            let finalTime = activeEffects.clockRounds > 0 ? 1000 : (activeEffects.luckStreakActive ? BASE_DECISION_TIME * currentSpeedModifier : BASE_DECISION_TIME);
            elTimer.textContent = `Decide fast! (${(finalTime/1000).toFixed(2)}s)`;
            timeoutId = setTimeout(timeOut, finalTime);
        }

        function nextRound() {
            respondedThisRound = false;
            if (currentRound >= TOTAL_ROUNDS) { endGame(); return; }
            currentRound++;
            
            currentColor = (activeEffects.luckStreakActive && Math.random() < 0.80) ? "green" : availableColors[Math.floor(Math.random() * availableColors.length)];
            elDisplay.style.backgroundColor = hexColors[currentColor];
            updateInventoryUI();
            updateEffectsUI();
            setupTimer();
        }

        function processChoice(userAction) {
            if (respondedThisRound) return; 
            respondedThisRound = true;
            clearTimeout(timeoutId);

            let change = 0;
            if (currentColor === "blue" && userAction === "hit") {
                change = activeEffects.multiplierActive ? 1.1 : 1;
            } else if (currentColor === "green" && userAction === "hit") {
                change = activeEffects.multiplierActive ? 2.2 : 2;
                if (activeEffects.luckStreakActive) currentSpeedModifier *= 0.666;
            } else if (currentColor === "red" && userAction === "hit") {
                change = activeEffects.reducerActive ? -1.2 : -1;
            }

            if ((currentColor !== "green" || userAction !== "hit") && activeEffects.luckStreakActive) {
                activeEffects.luckStreakActive = false;
                currentSpeedModifier = 1.0;
            }

            if (userAction === "hit") activeEffects.multiplierActive = false;
            if (currentColor === "red") activeEffects.reducerActive = false;

            score = Math.max(0, score + change);
            if (activeEffects.clockRounds > 0) activeEffects.clockRounds--;

            checkMilestones();
            elScore.textContent = parseFloat(score.toFixed(2));
            
            elDisplay.style.opacity = "0.5";
            elDisplay.style.backgroundColor = hexColors["default"];
            itemKeys.forEach(k => document.getElementById(`item-${k}`).setAttribute("disabled", "true"));
            
            setTimeout(() => {
                elDisplay.style.opacity = "1";
                setTimeout(nextRound, 100);
            }, 50);
        }

        function checkMilestones() {
            let floorScore = Math.floor(score);
            let currentMilestone = Math.floor(floorScore / 5);
            if (currentMilestone > lastScoreMilestone) {
                for (let i = 0; i < (currentMilestone - lastScoreMilestone); i++) {
                    inventory[itemKeys[Math.floor(Math.random() * itemKeys.length)]]++;
                }
                lastScoreMilestone = currentMilestone;
            } else if (floorScore < lastScoreMilestone * 5) {
                lastScoreMilestone = Math.floor(floorScore / 5);
            }
        }

        function timeOut() {
            if (respondedThisRound) return;
            respondedThisRound = true;

            if (currentColor !== "red") score = Math.max(0, score - 1); 
            activeEffects.luckStreakActive = false;
            currentSpeedModifier = 1.0;

            if (activeEffects.clockRounds > 0) activeEffects.clockRounds--;
            activeEffects.multiplierActive = activeEffects.reducerActive = false;

            checkMilestones();
            elScore.textContent = parseFloat(score.toFixed(2));
            elDisplay.style.backgroundColor = hexColors["default"];
            itemKeys.forEach(k => document.getElementById(`item-${k}`).setAttribute("disabled", "true"));
            setTimeout(nextRound, 200);
        }

        function endGame() {
            if (timeoutId) clearTimeout(timeoutId);
            elDisplay.style.backgroundColor = hexColors["default"];
            elControls.style.display = "none";
            elBtnStart.style.display = "inline-block";
            elBtnStart.textContent = "Play Again";
            elRules.style.display = "block";
            elTimer.textContent = "Game over!";
            elEffects.textContent = "";
            alert(`Game over! Your final score: ${parseFloat(score.toFixed(2))}`);
        }
    </script>
</body>
</html>
